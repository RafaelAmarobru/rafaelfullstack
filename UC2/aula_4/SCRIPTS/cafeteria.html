<!DOCTYPE html>
<html lang="pt-BR">
<head>

<style>

}

.titulo{

Nossa cafeteria oferece cafés especiais, bolos artesanais e ambiente confortável.
</p>

<p class="especial">

</p>

<ul>

    <li>Chocolate Quente</li>
